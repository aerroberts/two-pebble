name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Guard And Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # The guard CLI (https://github.com/aerroberts/guard) is a Rust binary and
      # is not present on the runner. Build and install it from source; cargo is
      # preinstalled on ubuntu runners and ~/.cargo/bin is already on PATH.
      - name: Install guard CLI
        run: cargo install --git https://github.com/aerroberts/guard guard-cli --locked

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run CI
        run: bun run ci
